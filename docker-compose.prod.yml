name: tasker

services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: tasker
      POSTGRES_USER: tasker
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
      TZ: ${TZ:-UTC}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tasker"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    image: ghcr.io/atlisd/postpone-api:latest
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      ConnectionStrings__Default: "Host=db;Database=tasker;Username=tasker;Password=${DB_PASSWORD:-changeme}"
      Jwt__Secret: ${JWT_SECRET}
      Jwt__Issuer: tasker-api
      Jwt__Audience: tasker-client
      Admin__Email: ${ADMIN_EMAIL:-admin@tasker.local}
      Admin__Password: ${ADMIN_PASSWORD:-admin123}
      Admin__DisplayName: ${ADMIN_DISPLAY_NAME:-Admin}
      App__Url: ${APP_URL:-http://localhost:3000}
      Pushover__ApiToken: ${PUSHOVER_API_TOKEN:-}
      TZ: ${TZ:-UTC}
      DEFAULT_TIMEZONE: ${TZ:-UTC}
      DEFAULT_LOCALE: ${DEFAULT_LOCALE:-en}
      ASPNETCORE_ENVIRONMENT: Production
    ports:
      - "5001:8080"

  client:
    image: ghcr.io/atlisd/postpone-client:latest
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "3000:80"

volumes:
  pgdata:
