name: Release

on:
  push:
    tags:
      - 'v*.*.*'

env:
  REGISTRY: ghcr.io
  API_IMAGE: ghcr.io/${{ github.repository_owner }}/postpone-api
  CLIENT_IMAGE: ghcr.io/${{ github.repository_owner }}/postpone-client

jobs:
  build-and-push:
    name: Build & push Docker images
    runs-on: ubuntu-latest
    permissions:
      contents: write       # needed to create GitHub Release
      packages: write       # needed to push to ghcr.io

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: ./src/Tasker.Api
          dockerfile: ./src/Tasker.Api/Dockerfile
          push: true
          tags: |
            ${{ env.API_IMAGE }}:${{ github.ref_name }}
            ${{ env.API_IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push client image
        uses: docker/build-push-action@v6
        with:
          context: ./client
          dockerfile: ./client/Dockerfile
          push: true
          tags: |
            ${{ env.CLIENT_IMAGE }}:${{ github.ref_name }}
            ${{ env.CLIENT_IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          body: |
            ## Docker images

            ```yaml
            # docker-compose.yml
            services:
              api:
                image: ${{ env.API_IMAGE }}:${{ github.ref_name }}
              client:
                image: ${{ env.CLIENT_IMAGE }}:${{ github.ref_name }}
            ```

            See [CLAUDE.md](https://github.com/${{ github.repository }}/blob/main/CLAUDE.md) for full setup instructions.
